<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Управление</title>
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Привет от ESP32!</h1>
        
        <p>
            Добро пожаловать на сервер ESP32. 
            Здесь будет отображаться информация с датчиков и органы управления.
        </p>
        
        <div class="button-group">
            <button class="btn-led" id="ledButton">Включить LED</button>
            <button class="btn-status" id="statusButton">Статус</button>
        </div>
        
        <div class="led-state" id="ledState">
            Состояние LED: неизвестно
        </div>
        
        <div class="status" id="status">
            Ожидание команды...
        </div>
    </div>
    
    <!-- Подключение скриптов -->
    <script src="script.js"></script>
</body>
</html>
