<!--
  ====================================================================
  index.html - Главная страница веб-интерфейса ESP32
  ====================================================================
  Описание: Структура страницы управления ESP32 через веб-интерфейс
           Поддерживает:
           - Управление LED (Вкл/Выкл)
           - Получение статуса системы
           - Отображение температуры с датчика DS18B20
           - Управление аудио (громкость, воспроизведение, стоп)
           - WebSocket для мгновенного обмена данными
  Автор: ralevech
  ====================================================================
-->

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Управление</title>
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Управление ESP32</h1>
        
        <!-- ===== УПРАВЛЕНИЕ LED ===== -->
        <div class="button-group">
            <button class="btn-led" id="ledButton">Включить LED</button>
            <button class="btn-status" id="statusButton">Статус</button>
        </div>
        
        <!-- ===== ДАТЧИКИ ===== -->
        <div class="sensor-data">
            <h3>Датчики</h3>
            <div id="temperature">Температура: -- °C</div>
        </div>
        
        <!-- ===== УПРАВЛЕНИЕ АУДИО ===== -->
        <div class="audio-controls">
            <h3>Аудио</h3>
            
            <!-- Слайдер громкости (0-21) -->
            <input type="range" id="volumeSlider" min="0" max="21" value="15">
            <span id="volumeValue">15</span>
            
            <div>
                <button id="playBtn" class="btn-play">▶ Воспроизвести</button>
                <button id="stopBtn" class="btn-stop">⏹ Стоп</button>
            </div>
            
            <!-- Статус аудио (выводится через WebSocket) -->
            <div id="audioStatus"></div>
        </div>
        
        <!-- ===== ИНДИКАЦИЯ СОСТОЯНИЯ ===== -->
        <div class="led-state" id="ledState">
            Состояние LED: неизвестно
        </div>
        
        <div class="status" id="status">
            Ожидание команды...
        </div>
    </div>
    
    <!-- Подключение скриптов -->
    <script src="script.js"></script>
</body>
</html>
