[env:esp32-s3-devkitc-1]                     ; Название конфигурации (среда сборки)
platform = espressif32                       ; Платформа — чипы Espressif 32-бит (ESP32, ESP32-S3)
board = esp32-s3-devkitc-1                   ; Модель платы (ESP32-S3 DevKitC-1)
framework = arduino                          ; Используем Arduino Framework (не ESP-IDF)
upload_protocol = esptool                    ; Протокол загрузки прошивки
upload_port = COM4                           ; Порт для загрузки прошивки и монитора

; ===== НАСТРОЙКИ МОНИТОРА ПОРТА =====
monitor_speed = 115200                       ; Скорость Serial (должна совпадать с Serial.begin())
monitor_port = COM4                          ; Порт для подключения монитора порта

; ===== НАСТРОЙКИ КОМПИЛЯЦИИ =====
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1              ; Включает виртуальный COM-порт для ESP32-S3
    -DARDUINO_USB_MODE=1                     ; Режим USB: 1 = Hardware CDC (без USB-OTG)
    -Iinclude                                ; Добавить папку include в пути поиска заголовков
    -Isrc/tasks                              ; Добавить папку tasks в пути поиска заголовков
    -DCORE_DEBUG_LEVEL=0                     ; Уровень отладки (0 = минимум, 4 = максимум)

; ===== БИБЛИОТЕКИ =====
lib_deps =                                   ; Зависимости (библиотеки) проекта
    ; arkhipenko/TaskScheduler @ ^3.8.5      ; Планировщик задач (пока закомментирован, раскомментировать при необходимости)
    ESP32Async/ESPAsyncWebServer @ ^3.7.0    ; Асинхронный веб-сервер для ESP32
    adafruit/Adafruit NeoPixel @ ^1.11.0     ; Библиотека для управления адресными светодиодами (WS2812 и др.)

; ===== ФАЙЛОВАЯ СИСТЕМА =====
board_build.filesystem = littlefs            ; Тип файловой системы для хранения данных (HTML, CSS, конфиги)