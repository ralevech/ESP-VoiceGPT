[env:esp32-s3-devkitc-1]
platform = espressif32                                 ; Платформа Espressif 32 (ESP32, ESP32-S3)
board = esp32-s3-devkitc-1                             ; Плата ESP32-S3-DevKitC-1 (8MB Flash, No PSRAM)
framework = arduino                                    ; Фреймворк Arduino
upload_protocol = esptool                              ; Протокол загрузки прошивки
upload_port = COM4                                     ; Порт для загрузки и монитора

monitor_speed = 115200                                 ; Скорость Serial
monitor_port = COM4                                    ; Порт монитора

build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1                        ; Виртуальный USB COM-порт
    -DARDUINO_USB_MODE=1                               ; Режим USB Hardware CDC
    -Iinclude                                          ; Путь к заголовкам
    -Isrc                                              ; Путь к корневой папке src (ДОБАВЛЕНО)
    -Isrc/tasks                                        ; Путь к задачам
    -Isrc/tasks/server
    -Isrc/tasks/audio                                  ; Путь к аудио-модулю (ДОБАВЛЕНО)
    -DCORE_DEBUG_LEVEL=0                               ; Уровень отладки
    -std=gnu++17                                       ; Стандарт C++17
    -D__cpp_lib_span=0                                 ; Отключить std::span
    -DBOARD_HAS_PSRAM                                  ; Явно указать отсутствие PSRAM

lib_deps = 
    ESP32Async/ESPAsyncWebServer @ ^3.7.0              ; Асинхронный веб-сервер
    ESP32Async/AsyncTCP @ ^3.0.0                       ; TCP для WebSocket (ДОБАВЛЕНО)
    adafruit/Adafruit NeoPixel @ ^1.11.0               ; Управление RGB светодиодами
    ; knolleary/PubSubClient @ ^2.8                    ; MQTT (ОТЛОЖЕНО)
    https://github.com/schreibfaul1/ESP32-audioI2S.git#b2b5312   ; Аудио (версия без std::span)
    OneWire
    DallasTemperature

board_build.filesystem = littlefs                      ; Файловая система LittleFS