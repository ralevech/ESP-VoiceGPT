[env:esp32-s3-devkitc-1]                     ; Название конфигурации (среда сборки)
platform = espressif32                       ; Платформа — чипы Espressif 32-бит (ESP32, ESP32-S3)
board = esp32-s3-devkitc-1                   ; Модель платы (твоя ESP32-S3 DevKitC-1)
framework = arduino                          ; Используем Arduino (не ESP-IDF)
upload_protocol = esptool                    ;
upload_port = COM4

; ===== НАСТРОЙКИ МОНИТОРА ПОРТА =====
monitor_speed = 115200                       ; Скорость Serial (для Serial.begin())
monitor_port = COM4                          ; СОM порт для заливки прошивки

; ===== НАСТРОЙКИ КОМПИЛЯЦИИ =====
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1              ; Включаем виртуальный COM-порт для ESP32-S3
    -Iinclude                                ; Путь к папке include
    -Isrc/tasks                              ; Путь к папке tasks
    -DARDUINO_USB_MODE=1                     ; ВАЖНО - настройка USB CDC:
    -DARDUINO_USB_CDC_ON_BOOT=1              ; ВАЖНО - настройка USB CDC:
    -DCORE_DEBUG_LEVEL=0                     ; ВАЖНО - настройка USB CDC:
    
; ===== БИБЛИОТЕКИ =====
lib_deps =                                   ; Список библиотек
    ; arkhipenko/TaskScheduler @ ^3.8.5      ; Планировщик задач (пока закомментирован)
    ESP32Async/ESPAsyncWebServer @ ^3.7.0    ; Асинхронный веб-сервер (последняя версия 3.x)
    adafruit/Adafruit NeoPixel@^1.11.0       ; Адресный светодиод на плате

; ===== ФАЙЛОВАЯ СИСТЕМА =====
board_build.filesystem = littlefs            ; Файловая система — LittleFS (для HTML)

